<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Article preview component</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
  </head>

  <body>
    <main class="container">
      <article class="card">
        <div class="card-image-wrapper">
          <img
            class="card-image"
            src="./images/drawers.jpg"
            alt="Green drawers with a vase on top"
          />
        </div>

        <div class="card-content">
          <h1 class="card-title">
            Shift the overall look and feel by adding these wonderful touches to
            furniture in your home
          </h1>

          <p class="card-text">
            Ever been in a room and felt like something was missing? Perhaps it
            felt slightly bare and uninviting. I've got some simple tips to help
            you make any room feel complete.
          </p>

          <div class="card-author">
            <img
              class="profile-img"
              src="./images/avatar-michelle.jpg"
              alt="Michelle Appleton"
            />

            <div class="author-details">
              <span class="author-name">Michelle Appleton</span>
              <span class="post-date">28 Jun 2020</span>
            </div>

            <div class="share-panel">
              <span class="share-text">SHARE</span>

              <a href="#" aria-label="Facebook">
                <img
                  src="./images/icon-facebook.svg"
                  alt=""
                  aria-hidden="true"
                />
              </a>

              <a href="#" aria-label="Twitter">
                <img
                  src="./images/icon-twitter.svg"
                  alt=""
                  aria-hidden="true"
                />
              </a>

              <a href="#" aria-label="Pinterest">
                <img
                  src="./images/icon-pinterest.svg"
                  alt=""
                  aria-hidden="true"
                />
              </a>
            </div>

            <button
              type="button"
              class="share-btn"
              aria-label="Share this article"
            >
              <img src="./images/icon-share.svg" alt="" aria-hidden="true" />
            </button>
          </div>
        </div>
      </article>
    </main>

    <script>
      const shareBtn = document.querySelector(".share-btn");
      const cardAuthor = document.querySelector(".card-author");

      shareBtn.addEventListener("click", () => {
        cardAuthor.classList.toggle("active");
      });
    </script>
  </body>
</html>
